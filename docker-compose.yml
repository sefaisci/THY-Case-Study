name: thy-agentic-rag

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thy_case_study}
      POSTGRES_USER: ${POSTGRES_USER:-thy_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-thy_app}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-thy_case_study}
      UPLOAD_DIR: /app/data/uploads
      PAGE_IMAGE_DIR: /app/data/page_images
      PROCESSING_DIR: /app/data/processing
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      SOFFICE_BINARY: ${SOFFICE_BINARY:-/usr/bin/soffice}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173,http://localhost:8501,http://127.0.0.1:8501}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/data/uploads
      - page_images_data:/app/data/page_images
      - processing_data:/app/data/processing
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    command: ["sh", "-c", "alembic -c alembic.ini upgrade head && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/react
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  streamlit:
    profiles: ["streamlit"]
    build:
      context: .
      dockerfile: frontend/streamlit/Dockerfile
    environment:
      BACKEND_BASE_URL: http://backend:8000
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  page_images_data:
  processing_data:
